services:
  app:
    build:
      context: .
      args:
        # Path prefix the app is served under (e.g. /plan). Baked at build
        # time because Next.js' basePath is a compile-time setting.
        NEXT_PUBLIC_BASE_PATH: "${NEXT_PUBLIC_BASE_PATH:-}"
    container_name: urus-app
    restart: unless-stopped
    environment:
      # Shared team password + cookie-signing secret. Set these in a .env
      # file next to this compose file (see .env.example).
      APP_PASSWORD: "${APP_PASSWORD:?set APP_PASSWORD}"
      SESSION_SECRET: "${SESSION_SECRET:?set SESSION_SECRET}"
      # When set, absolute links use this origin (even behind a tunnel).
      PUBLIC_APP_URL: "${PUBLIC_APP_URL:-}"
    volumes:
      # Persists app.db (+ WAL/SHM) and uploads/ across restarts & rebuilds.
      - ./data:/app/data
    ports:
      # Bound to 0.0.0.0 so other machines on the LAN can reach it
      # (it's password-protected). Defaults to 3210; override with URUS_PORT.
      # For host-only access, change to "127.0.0.1:${URUS_PORT:-3210}:80".
      - "0.0.0.0:${URUS_PORT:-3210}:80"
    healthcheck:
      test:
        - CMD-SHELL
        # statusCode < 500 tolerates a basePath redirect/404 on `/`.
        - >-
          node -e "require('http').get('http://127.0.0.1:80/', r =>
          process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () =>
          process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 5s
